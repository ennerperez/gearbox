name: Test
on:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Permissions
        run: chmod +x build.sh

      - name: Unit Tests
        run: ./build.sh --target Tests --no-logo
        continue-on-error: true

      - name: Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            artifacts/test-results
          if-no-files-found: warn
